<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Railway-Admiral 压测沙盘</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            /* 简单的终端日志滚动条样式 */
            #log-container::-webkit-scrollbar {
                width: 6px;
            }
            #log-container::-webkit-scrollbar-thumb {
                background: #4b5563;
                border-radius: 4px;
            }
        </style>
    </head>
    <body class="bg-gray-900 text-gray-100 min-h-screen p-8 font-sans">
        <div class="max-w-4xl mx-auto">
            <header class="mb-10 text-center">
                <h1
                    class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400"
                >
                    ⚡ Railway-Admiral 控制台
                </h1>
                <p class="mt-2 text-gray-400">
                    高并发分布式火车票务管理系统 - 极限防超卖演示
                </p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div
                    class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg"
                >
                    <h2 class="text-xl font-bold mb-4 text-blue-300">
                        ⚙️ 第一步：环境筑基
                    </h2>
                    <p class="text-sm text-gray-400 mb-6">
                        向 PostgreSQL
                        写入基础测试字典（车站、业务员、车次、区间票价）。
                    </p>
                    <button
                        id="btn-init"
                        onclick="initSystem()"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors"
                    >
                        01. 初始化系统基础数据
                    </button>
                </div>

                <div
                    class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg"
                >
                    <h2 class="text-xl font-bold mb-4 text-red-400">
                        🔥 第二步：压力测试
                    </h2>
                    <p class="text-sm text-gray-400 mb-6">
                        模拟 100 个并发网络请求，同时抢夺 [1号车次] 的
                        [7号座位]。
                    </p>
                    <button
                        id="btn-attack"
                        onclick="launchAttack()"
                        disabled
                        class="w-full bg-red-600 hover:bg-red-500 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded transition-colors flex items-center justify-center"
                    >
                        <span id="attack-text"
                            >02. 100个请求并发全速冲锋！</span
                        >
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-8 text-center">
                <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
                    <div class="text-gray-400 text-sm mb-1">总请求数</div>
                    <div class="text-3xl font-mono text-white" id="stat-total">
                        0
                    </div>
                </div>
                <div
                    class="bg-gray-800 p-4 rounded-lg border border-green-900 shadow-[0_0_15px_rgba(34,197,94,0.2)]"
                >
                    <div class="text-green-400 text-sm mb-1">购票成功</div>
                    <div
                        class="text-3xl font-mono text-green-400"
                        id="stat-success"
                    >
                        0
                    </div>
                </div>
                <div
                    class="bg-gray-800 p-4 rounded-lg border border-red-900 shadow-[0_0_15px_rgba(239,68,68,0.2)]"
                >
                    <div class="text-red-400 text-sm mb-1">被锁/触发器拦截</div>
                    <div
                        class="text-3xl font-mono text-red-500"
                        id="stat-failed"
                    >
                        0
                    </div>
                </div>
            </div>

            <div
                class="bg-black rounded-xl p-4 border border-gray-700 font-mono text-sm shadow-2xl"
            >
                <div
                    class="flex justify-between items-center mb-2 border-b border-gray-800 pb-2"
                >
                    <span class="text-gray-500">System Log output...</span>
                    <button
                        onclick="clearLog()"
                        class="text-xs text-gray-500 hover:text-white transition-colors"
                    >
                        Clear
                    </button>
                </div>
                <div id="log-container" class="h-64 overflow-y-auto space-y-1">
                    <div class="text-gray-500">等待指令...</div>
                </div>
            </div>
        </div>

        <script>
            const API_BASE = "http://127.0.0.1:8080/api/v1";

            // 统一的 Fetch 封装
            async function apiCall(endpoint, payload) {
                try {
                    const response = await fetch(`${API_BASE}${endpoint}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });
                    const data = await response.json();
                    return { status: response.status, data };
                } catch (err) {
                    return {
                        status: 500,
                        data: {
                            message:
                                "网络连接失败，请确认 Rust 后端已启动在 8080 端口",
                        },
                    };
                }
            }

            // 日志打印函数
            function log(message, type = "info") {
                const container = document.getElementById("log-container");
                const time = new Date()
                    .toISOString()
                    .split("T")[1]
                    .slice(0, -1);
                const color =
                    type === "error"
                        ? "text-red-400"
                        : type === "success"
                          ? "text-green-400"
                          : "text-blue-300";
                const icon =
                    type === "error" ? "✖" : type === "success" ? "✔" : "➜";

                const div = document.createElement("div");
                div.className = `${color}`;
                div.innerHTML = `<span class="text-gray-500">[${time}]</span> ${icon} ${message}`;

                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            function clearLog() {
                document.getElementById("log-container").innerHTML = "";
            }

            // ================= 业务逻辑 =================

            async function initSystem() {
                clearLog();
                log("开始初始化基础环境...", "info");
                document.getElementById("btn-init").disabled = true;

                // 1. 注册车站
                await apiCall("/stations", {
                    station_id: 1,
                    station_name: "青岛",
                });
                await apiCall("/stations", {
                    station_id: 2,
                    station_name: "北京",
                });
                log("车站 [1: 青岛], [2: 北京] 注册完毕", "success");

                // 2. 注册业务员
                await apiCall("/clerks", { clerk_id: 1, name: "Admin01" });
                log("业务员 [Admin01] 注册完毕", "success");

                // 3. 注册车次 (总共只有 3 个座位)
                await apiCall("/trains", {
                    train_id: 1,
                    name: "G888",
                    total_seats: 3,
                });
                log("车次 [G888] 注册完毕，总座位: 3", "success");

                // 4. 配置价格与区间顺序
                await apiCall("/prices", {
                    train_id: 1,
                    from_station: 1,
                    to_station: 2,
                    price_cents: 5000,
                    from_seq: 1,
                    to_seq: 2,
                });
                log("区间票价与物理排序配置完毕！系统已就绪。", "success");

                // 解锁攻击按钮
                document.getElementById("btn-attack").disabled = false;
                document.getElementById("btn-init").innerText =
                    "环境已初始化完成";
            }

            async function launchAttack() {
                const attackBtn = document.getElementById("btn-attack");
                attackBtn.disabled = true;
                attackBtn.classList.add("animate-pulse");
                document.getElementById("attack-text").innerText =
                    "并发冲锋中...";

                log("====================================");
                log(
                    "🚀 发起 100 个并发购票请求，抢夺 G888 次列车 7 号座位！",
                    "info",
                );

                let successCount = 0;
                let failedCount = 0;
                const totalRequests = 100;

                // 重置面板
                document.getElementById("stat-total").innerText = totalRequests;
                document.getElementById("stat-success").innerText = "0";
                document.getElementById("stat-failed").innerText = "0";

                const payload = {
                    clerk_id: 1,
                    train_id: 1,
                    from_station_id: 1,
                    to_station_id: 2,
                    seat_number: 7,
                    price_cents: 5000,
                };

                // 构造 100 个完全并行的 Promise
                const promises = Array.from({ length: totalRequests }).map(
                    async (_, index) => {
                        const reqId = index + 1;
                        const result = await apiCall("/tickets/sell", payload);

                        if (result.status === 200) {
                            successCount++;
                            log(
                                `[Req-${reqId}] 突破防线！购票成功！`,
                                "success",
                            );
                            document.getElementById("stat-success").innerText =
                                successCount;
                        } else {
                            failedCount++;
                            // 大部分应该都是 409 Conflict (P0003 区间冲突拦截)
                            log(
                                `[Req-${reqId}] 被拦截: ${result.data.message}`,
                                "error",
                            );
                            document.getElementById("stat-failed").innerText =
                                failedCount;
                        }
                    },
                );

                // 等待所有请求冲锋结束
                await Promise.all(promises);

                log("====================================");
                log(
                    `并发压测结束。成功: ${successCount}, 被拦截: ${failedCount}`,
                    "info",
                );

                attackBtn.classList.remove("animate-pulse");
                document.getElementById("attack-text").innerText =
                    "再次发起冲锋";
                attackBtn.disabled = false;
            }
        </script>
    </body>
</html>
